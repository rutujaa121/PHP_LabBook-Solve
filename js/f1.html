<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form action="#" method="POST">
        Enter Username: <input type="text" id="t1"><br><br>
        Enter Password: <input type="password" id="t2"><br><br>
        <input type="submit" value="Submit" onclick="validate()">

    </form>
</body>

</html>

<script>
    function validate() {
        let username = document.getElementById("t1").value;
        let password = document.getElementById("t2").value;

        let userreg = "[A-Z][a-z][4]$";
        let passreg = "^[?=.*A-Z][a-z 0-9]{4,8}$";

        if (username.match(userreg) && password.match(passreg)) {
            window.alert("login Successfully");
        }
        else
        {
            window.alert("Invalid username or Password");
        }
    }
</script>
